<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenClaw 控制面板</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦞</text></svg>">
<style>
  :root {
    --bg-primary: #0a0a0a;
    --bg-secondary: #111111;
    --bg-card: #171717;
    --bg-card-hover: #1e1e1e;
    --border: #262626;
    --border-subtle: #1e1e1e;
    --text-primary: #fafafa;
    --text-secondary: #d4d4d8;
    --text-muted: #a1a1aa;
    --accent: #3b82f6;
    --accent-glow: rgba(59,130,246,.15);
    --green: #22c55e;
    --green-bg: rgba(34,197,94,.1);
    --red: #ef4444;
    --red-bg: rgba(239,68,68,.1);
    --yellow: #eab308;
    --yellow-bg: rgba(234,179,8,.1);
    --purple: #a855f7;
    --purple-bg: rgba(168,85,247,.1);
    --blue: #3b82f6;
    --blue-bg: rgba(59,130,246,.1);
    --orange: #f97316;
    --orange-bg: rgba(249,115,22,.1);
    --radius: 12px;
    --radius-sm: 8px;
    --sidebar-width: 240px;
    --header-height: 60px;
    /* Spacing system based on 8px grid */
    --spacing-xs: 4px;
    --spacing-sm: 8px;
    --spacing-md: 16px;
    --spacing-lg: 24px;
    --spacing-xl: 32px;
    --spacing-2xl: 48px;
    /* Font sizes following 8px baseline */
    --font-xs: 12px;
    --font-sm: 14px;
    --font-base: 16px;
    --font-lg: 18px;
    --font-xl: 20px;
    --font-2xl: 24px;
    --font-3xl: 30px;
    --font-4xl: 36px;
    --font-5xl: 48px;
    /* Line heights */
    --line-height-tight: 1.25;
    --line-height-snug: 1.375;
    --line-height-normal: 1.5;
    --line-height-relaxed: 1.625;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  /* Layout */
  .layout {
    display: flex;
    min-height: 100vh;
  }
  /* Sidebar */
  .sidebar {
    width: var(--sidebar-width);
    background: var(--bg-secondary);
    border-right: 1px solid var(--border);
    padding: 16px 0;
    position: fixed;
    height: calc(100vh - var(--header-height));
    overflow-y: auto;
    z-index: 90;
    transition: transform .3s ease;
  }
  .sidebar.hidden {
    transform: translateX(-100%);
  }
  .sidebar-nav {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 0 12px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: all .15s;
    color: var(--text-secondary);
    text-decoration: none;
    min-height: 44px; /* Ensure touch target meets 44px minimum */
  }
  .nav-item:hover {
    background: rgba(255,255,255,.08);
    color: var(--text-primary);
  }
  .nav-item:focus {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }
  .nav-item.active {
    background: var(--accent-glow);
    color: var(--accent);
  }
  .nav-item.active:hover {
    background: var(--accent-glow);
  }
  .nav-item i {
    font-size: 18px;
    min-width: 20px;
  }
  .nav-item span {
    font-size: 14px;
    font-weight: 500;
  }
  /* Main content */
  .main-content {
    flex: 1;
    margin-left: var(--sidebar-width);
    padding: 24px;
    transition: margin-left .3s ease;
    min-height: calc(100vh - var(--header-height));
    padding-top: calc(24px + var(--header-height)); /* Account for fixed header */
  }
  .main-content.full-width {
    margin-left: 0;
  }
  /* Header */
  .header {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: rgba(10,10,10,.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: var(--header-height);
    min-height: var(--header-height);
  }
  .header.hidden {
    left: 0;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    font-size: 24px;
  }
  .header-title {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.02em;
  }
  .header-center {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    animation: pulse 2s infinite;
  }
  .status-dot.offline {
    background: var(--red);
    box-shadow: 0 0 6px var(--red);
  }
  .status-dot.warning {
    background: var(--yellow);
    box-shadow: 0 0 6px var(--yellow);
  }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: .5; }
  }
  /* Mobile menu button */
  .menu-btn {
    display: none;
    background: none;
    border: none;
    color: var(--text-primary);
    font-size: 20px;
    cursor: pointer;
    padding: 12px;
    border-radius: var(--radius-sm);
    min-width: 44px;
    min-height: 44px;
    align-items: center;
    justify-content: center;
  }
  .menu-btn:hover {
    background: rgba(255,255,255,.1);
  }
  .menu-btn:focus {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  /* Page content */
  .page-content {
    max-width: 1200px;
    margin: 0 auto;
  }
  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 24px;
    margin-bottom: 24px;
  }
  .grid-full {
    grid-column: 1 / -1;
  }
  /* Card */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: border-color .2s, background .2s;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  }
  .card:hover {
    border-color: var(--accent);
    background: var(--bg-card-hover);
    box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
  }
  .card:focus {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }
  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .card-icon {
    font-size: 18px;
  }
  /* Badge */
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
  }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-red { background: var(--red-bg); color: var(--red); }
  .badge-yellow { background: var(--yellow-bg); color: var(--yellow); }
  .badge-blue { background: var(--accent-glow); color: var(--accent); }
  .badge-purple { background: var(--purple-bg); color: var(--purple); }
  .badge-orange { background: var(--orange-bg); color: var(--orange); }

  /* Stat */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px,1fr));
    gap: 20px;
  }
  .stat-item { 
    padding: 16px;
    background: var(--bg-secondary);
    border-radius: var(--radius-sm);
  }
  .stat-label {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 8px;
  }
  .stat-value {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  /* List items */
  .list-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    border: 1px solid var(--border-subtle);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    transition: background .15s;
    min-height: 60px; /* Ensure adequate spacing and touch target */
  }
  .list-item:hover {
    background: rgba(255,255,255,.05);
  }
  .list-item:focus {
    outline: 2px solid var(--accent);
    outline-offset: -2px;
  }
  .list-item:last-child {
    margin-bottom: 0;
  }
  .list-item-left {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
  }
  .list-item-name {
    font-size: 15px;
    font-weight: 500;
  }
  .list-item-sub {
    font-size: 13px;
    color: var(--text-muted);
  }
  .list-item-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Button */
  .btn {
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--bg-secondary);
    color: var(--text-primary);
    transition: all .15s;
    min-height: 44px; /* Ensure touch target meets 44px minimum */
  }
  .btn:hover {
    background: rgba(255,255,255,.1);
    border-color: var(--accent);
  }
  .btn:focus {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
  }
  .btn:active {
    transform: scale(.97);
  }
  .btn-danger { 
    border-color: var(--red); 
    color: var(--red); 
    background: var(--red-bg);
  }
  .btn-danger:hover { 
    background: var(--red); 
    color: white;
    border-color: var(--red);
  }
  .btn-sm { 
    padding: 6px 12px; 
    font-size: 12px; 
    min-height: auto;
  }
  .btn:disabled { 
    opacity: .5; 
    cursor: not-allowed;
    transform: none;
  }

  /* Test result inline */
  .test-result { font-size: 11px; margin-top: 4px; }

  /* Skeleton */
  .skeleton {
    background: linear-gradient(90deg, var(--bg-card) 25%, #222 50%, var(--bg-card) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
    border-radius: 6px;
    height: 16px;
    margin: 6px 0;
  }
  .skeleton.line {
    width: 100%;
  }
  .skeleton.short {
    width: 60%;
  }
  .skeleton.half {
    width: 50%;
  }
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* Empty state */
  .empty {
    text-align: center;
    padding: 24px;
    color: var(--text-muted);
    font-size: 13px;
  }

  /* Progress bar */
  .progress-bar {
    height: 6px;
    border-radius: 3px;
    background: var(--bg-secondary);
    overflow: hidden;
    margin-top: 8px;
  }
  .progress-fill {
    height: 100%;
    border-radius: 3px;
    transition: width .5s ease;
  }

  /* Modal overlay */
  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 1000;
    background: rgba(0,0,0,.6);
    backdrop-filter: blur(4px);
    display: none;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.show {
    display: flex;
  }
  .modal {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    max-width: 400px;
    width: 90%;
  }
  .modal h3 {
    margin-bottom: 12px;
    font-size: 16px;
  }
  .modal p {
    font-size: 14px;
    color: var(--text-secondary);
    margin-bottom: 20px;
  }
  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  /* Collapsible */
  .collapsible {
    margin-top: 12px;
  }
  .collapsible-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    cursor: pointer;
    border-bottom: 1px solid var(--border-subtle);
    min-height: 44px;
  }
  .collapsible-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height .3s ease;
  }
  .collapsible.open .collapsible-content {
    max-height: 1000px;
  }
  .collapsible-toggle {
    font-size: 12px;
    color: var(--text-muted);
  }

  /* Log viewer */
  .log-viewer {
    background: var(--bg-secondary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 16px;
    max-height: 400px;
    overflow-y: auto;
    font-family: 'SF Mono', 'Monaco', monospace;
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .log-line {
    margin-bottom: 4px;
  }
  .log-error { color: var(--red); }
  .log-warning { color: var(--yellow); }
  .log-info { color: var(--text-secondary); }

  /* Responsive */
  @media (max-width: 768px) {
    .sidebar {
      transform: translateX(-100%);
      width: 80%;
      max-width: 280px;
    }
    .sidebar.show {
      transform: translateX(0);
    }
    .main-content {
      margin-left: 0;
    }
    .header {
      padding: 0 16px;
    }
    .menu-btn {
      display: flex;
    }
    .grid {
      grid-template-columns: 1fr;
      gap: 20px;
    }
    .stat-grid {
      grid-template-columns: 1fr 1fr;
    }
    .main-content {
      padding: 16px;
      padding-top: calc(16px + var(--header-height));
    }
    .card {
      padding: 20px;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <button class="menu-btn" onclick="toggleSidebar()">☰</button>
    <span class="header-logo">🦞</span>
    <span class="header-title">OpenClaw 控制面板</span>
  </div>
  <div class="header-center">
    <span id="gateway-status"><span class="status-dot"></span> Connecting...</span>
    <span id="last-refresh">--</span>
  </div>
  <div class="header-right">
    <button class="btn" onclick="refreshAll()">🔄 刷新</button>
    <button class="btn btn-danger" onclick="showRestartModal()">⚠️ Restart</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sidebar-nav">
      <a href="#/" class="nav-item active" data-page="overview">
        <i>📊</i>
        <span>Overview</span>
      </a>
      <a href="#/agents" class="nav-item" data-page="agents">
        <i>🤖</i>
        <span>智能体</span>
      </a>
      <a href="#/models" class="nav-item" data-page="models">
        <i>🧠</i>
        <span>模型</span>
      </a>
      <a href="#/sessions" class="nav-item" data-page="sessions">
        <i>💬</i>
        <span>会话</span>
      </a>
      <a href="#/cron" class="nav-item" data-page="cron">
        <i>⏰</i>
        <span>定时任务</span>
      </a>
      <a href="#/skills" class="nav-item" data-page="skills">
        <i>🔧</i>
        <span>技能</span>
      </a>
      <a href="#/channels" class="nav-item" data-page="channels">
        <i>📡</i>
        <span>通道</span>
      </a>
      <a href="#/memory" class="nav-item" data-page="memory">
        <i>🧠</i>
        <span>记忆</span>
      </a>
      <a href="#/logs" class="nav-item" data-page="logs">
        <i>📋</i>
        <span>Logs</span>
      </a>
      <a href="#/config" class="nav-item" data-page="config">
        <i>⚙️</i>
        <span>Config</span>
      </a>
    </div>
  </div>

  <div class="main-content" id="main-content">
    <div class="page-content" id="page-container">
      <!-- Content will be loaded here -->
    </div>
  </div>
</div>

<!-- Restart confirm modal -->
<div class="modal-overlay" id="restart-modal">
  <div class="modal">
    <h3>⚠️ 确认重启网关?</h3>
    <p>This will interrupt all active sessions. Are you sure you want to continue?</p>
    <div class="modal-actions">
      <button class="btn" onclick="hideRestartModal()">取消</button>
      <button class="btn btn-danger" onclick="doRestart()">确认重启</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8899';
let currentPage = 'overview';
let auto刷新Interval;

// Navigation
function navigateTo(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[data-page="${page}"]`).classList.add('active');
  loadPageContent(page);
}

function loadPageContent(page) {
  const container = document.getElementById('page-container');
  switch(page) {
    case 'overview':
      container.innerHTML = getOverviewContent();
      loadOverviewData();
      break;
    case 'agents':
      container.innerHTML = getAgentsContent();
      loadAgentsData();
      break;
    case 'models':
      container.innerHTML = getModelsContent();
      loadModelsData();
      break;
    case 'sessions':
      container.innerHTML = getSessionsContent();
      loadSessionsData();
      break;
    case 'cron':
      container.innerHTML = getCronContent();
      loadCronData();
      break;
    case 'skills':
      container.innerHTML = getSkillsContent();
      loadSkillsData();
      break;
    case 'channels':
      container.innerHTML = getChannelsContent();
      loadChannelsData();
      break;
    case 'memory':
      container.innerHTML = getMemoryContent();
      loadMemoryData();
      break;
    case 'logs':
      container.innerHTML = getLogsContent();
      loadLogsData();
      break;
    case 'config':
      container.innerHTML = getConfigContent();
      loadConfigData();
      break;
    default:
      container.innerHTML = '<div class="empty">Page not found</div>';
  }
}

function getOverviewContent() {
  return `
    <div class="grid">
      <!-- 网关状态 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">⚡ 网关</span>
          <span id="gw-badge" class="badge badge-yellow">loading</span>
        </div>
        <div id="gw-content">
          <div class="skeleton line"></div>
          <div class="skeleton line half"></div>
        </div>
      </div>

      <!-- 系统信息 -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">🖥️ System</span>
        </div>
        <div id="sys-content">
          <div class="skeleton line"></div>
          <div class="skeleton line"></div>
        </div>
      </div>

      <!-- Stats summary -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">📈 Summary</span>
        </div>
        <div class="stat-grid">
          <div class="stat-item"><div class="stat-label">智能体</div><div class="stat-value" id="summary-agents">--</div></div>
          <div class="stat-item"><div class="stat-label">模型</div><div class="stat-value" id="summary-models">--</div></div>
          <div class="stat-item"><div class="stat-label">会话</div><div class="stat-value" id="summary-sessions">--</div></div>
          <div class="stat-item"><div class="stat-label">定时任务</div><div class="stat-value" id="summary-cron">--</div></div>
        </div>
      </div>

      <!-- Agents -->
      <div class="card grid-full">
        <div class="card-header">
          <span class="card-title">🤖 智能体</span>
          <span id="agent-count" class="badge badge-blue">--</span>
        </div>
        <div id="agents-content">
          <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        </div>
      </div>

      <!-- Models -->
      <div class="card grid-full">
        <div class="card-header">
          <span class="card-title">🧠 模型</span>
          <span id="model-count" class="badge badge-blue">--</span>
        </div>
        <div id="models-content">
          <div class="skeleton"></div><div class="skeleton"></div>
        </div>
      </div>

      <!-- Sessions -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">💬 会话</span>
          <span id="session-count" class="badge badge-blue">--</span>
        </div>
        <div id="sessions-content">
          <div class="skeleton"></div><div class="skeleton"></div>
        </div>
      </div>

      <!-- Cron Jobs -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">⏰ 定时任务</span>
          <span id="cron-count" class="badge badge-blue">--</span>
        </div>
        <div id="cron-content">
          <div class="skeleton"></div>
        </div>
      </div>
    </div>
  `;
}

function getAgentsContent() {
  return `
    <div class="grid" style="grid-template-columns: 1fr 1fr;">
      <div class="card">
        <div class="card-header">
          <span class="card-title">🤖 所有智能体</span>
          <span id="agents-total-count" class="badge badge-blue">--</span>
        </div>
        <div id="agents-list">
          <div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>
        </div>

async function fetchAPI(path) {
  try {
    const r = await fetch(API + path, { signal: AbortSignal.timeout(10000) });
    return await r.json();
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

function formatTime(date) {
  return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}

function escapeHtml(str) {
  if (typeof str !== 'string') str = String(str);
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Navigation handling
function handleHashChange() {
  const hash = window.location.hash.substring(1) || '/';
  let page = 'overview';
  if (hash === '/agents') page = 'agents';
  else if (hash === '/models') page = 'models';
  else if (hash === '/sessions') page = 'sessions';
  else if (hash === '/cron') page = 'cron';
  else if (hash === '/skills') page = 'skills';
  else if (hash === '/channels') page = 'channels';
  else if (hash === '/memory') page = 'memory';
  else if (hash === '/logs') page = 'logs';
  else if (hash === '/config') page = 'config';
  navigateTo(page);
}

// Sidebar toggle
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const header = document.querySelector('.header');
  sidebar.classList.toggle('show');
  header.classList.toggle('hidden');
}

// Close sidebar when clicking outside
document.addEventListener('click', (e) => {
  const sidebar = document.getElementById('sidebar');
  const menuBtn = document.querySelector('.menu-btn');
  if (window.innerWidth <= 768 && 
      !sidebar.contains(e.target) && 
      !menuBtn.contains(e.target) &&
      sidebar.classList.contains('show')) {
    toggleSidebar();
  }
});

// Gateway status
async function loadGateway() {
  const res = await fetchAPI('/api/gateway/status');
  const el = document.getElementById('gw-content');
  const badge = document.getElementById('gw-badge');
  const statusEl = document.getElementById('gateway-status');

  if (!res.ok) {
    badge.className = 'badge badge-red'; 
    badge.textContent = 'offline';
    statusEl.innerHTML = '<span class="status-dot offline"></span> Offline';
    el.innerHTML = '<div class="empty">Cannot connect to Gateway</div>';
    return;
  }
  
  const d = res.data;
  const running = d.running !== false;
  badge.className = running ? 'badge badge-green' : 'badge badge-red';
  badge.textContent = running ? 'running' : 'stopped';
  statusEl.innerHTML = `<span class="status-dot ${running?'':'offline'}"></span> ${running?'Online':'Offline'}`;

  const raw = typeof d === 'object' ? JSON.stringify(d, null, 2) : d;
  el.innerHTML = `<div style="font-size:13px;color:var(--text-secondary);word-break:break-all;max-height:200px;overflow-y:auto;line-height:1.6"><pre style="margin:0;font-size:12px;">${escapeHtml(raw)}</pre></div>`;
}

// System info
async function loadSystem() {
  const res = await fetchAPI('/api/system/info');
  const el = document.getElementById('sys-content');
  if (!res.ok) { 
    el.innerHTML = '<div class="empty">加载失败</div>'; 
    return; 
  }
  const d = res.data;
  const memPct = parseFloat(d.usedMemoryPercent);
  const memColor = memPct > 90 ? 'var(--red)' : memPct > 70 ? 'var(--yellow)' : 'var(--green)';

  el.innerHTML = `
    <div class="stat-grid">
      <div class="stat-item"><div class="stat-label">CPU</div><div class="stat-value">${d.cpuCores} cores</div></div>
      <div class="stat-item"><div class="stat-label">Load</div><div class="stat-value">${d.loadAvg[0]}</div></div>
      <div class="stat-item"><div class="stat-label">记忆</div><div class="stat-value">${d.usedMemoryPercent}%</div></div>
      <div class="stat-item"><div class="stat-label">Uptime</div><div class="stat-value">${d.uptime}</div></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" style="width:${memPct}%;background:${memColor}"></div></div>
    <div style="margin-top:8px;font-size:11px;color:var(--text-muted)">${d.hostname} · ${d.platform}/${d.arch} · Node ${d.nodeVersion}</div>

async function loadAgentDetails(agentId) {
  console.log('点击 View，agentId:', agentId);
  const res = await fetchAPI(`/api/agents/${agentId}/files`);
  console.log('API 返回:', res);
  const contentEl = document.getElementById('agent-details');
  
  if (!res.ok) {
    contentEl.innerHTML = '<div class="empty">加载失败 agent details</div>';
    return;
  }
  
  const files = res.data?.files || {};
  console.log('files:', files);
  console.log('files keys:', Object.keys(files));
  console.log('files length:', Object.keys(files).length);
  let html = '<div style="font-size:13px;max-height:400px;overflow-y:auto;">';
  
  if (Object.keys(files).length === 0) {
    html += '<div class="empty">没有找到文件（检查 agent workspace 是否存在）</div>';
    html += '<pre style="font-size:11px;color:var(--text-muted);">' + JSON.stringify(res.data, null, 2) + '</pre>';
  } else {
    for (const [filename, content] of Object.entries(files)) {
      html += `
        <div class="collapsible">
          <div class="collapsible-header">
            <strong>${escapeHtml(filename)}</strong>
            <span class="collapsible-toggle">▼</span>
          </div>
          <div class="collapsible-content">
            <pre style="margin:8px 0;padding:8px;background:var(--bg-secondary);border-radius:var(--radius-sm);font-size:11px;white-space:pre-wrap;overflow-x:auto;">${escapeHtml(content)}</pre>
          </div>
        </div>
      `;
    }
  }
  
  html += '</div>';
  console.log('渲染 HTML');
  contentEl.innerHTML = html;
  
  // Add collapsible behavior
  document.querySelectorAll('.collapsible-header').forEach(header => {
    header.addEventListener('click', () => {
      const collapsible = header.parentElement;
      collapsible.classList.toggle('open');
    });
  });
}

    const status = c.connected ? 'connected' : 'disconnected';
    const bindings = c.bindings || [];
    
    return `
      <div class="list-item">
        <div class="list-item-left">
          <div class="list-item-name">${escapeHtml(name)}</div>
          <div class="list-item-sub">类型: ${escapeHtml(type)} · 状态: ${escapeHtml(status)}</div>
          <div class="list-item-sub">Bindings: ${bindings.length} groups</div>
        </div>
        <div class="list-item-right">
          <span class="badge ${c.connected ? 'badge-green' : 'badge-red'}">${status}</span>
        </div>
      </div>
    `;
  }).join('');
}

async function loadMemoryData() {
  const res = await fetchAPI('/api/memory');
  const countEl = document.getElementById('memory-total-count');
  const contentEl = document.getElementById('memory-list');
  
  if (!res.ok) { 
    countEl.textContent = 'err';
    contentEl.innerHTML = '<div class="empty">加载失败 memory files</div>';
    return; 
  }
  
  const files = Array.isArray(res.data) ? res.data : [];
  countEl.textContent = files.length;
  
  if (!files.length) {
    contentEl.innerHTML = '<div class="empty">No memory files</div>';
    return;
  }
  
  contentEl.innerHTML = files.map(f => {
    const name = f.name || f.filename || f.path || 'unknown';
    const size = f.size || f.bytes || 0;
    const modified = f.modified || f.lastModified || 'unknown';
    
    return `
      <div class="list-item">
        <div class="list-item-left">
          <div class="list-item-name">${escapeHtml(name)}</div>
          <div class="list-item-sub">Size: ${size} bytes · Modified: ${escapeHtml(modified)}</div>
        </div>
        <div class="list-item-right">
          <button class="btn btn-sm" onclick="loadMemoryFile('${encodeURIComponent(name)}')">View</button>
        </div>
      </div>
    `;
  }).join('');
}

async function loadMemoryFile(filename) {
  const res = await fetchAPI(`/api/memory/${filename}`);
  const contentEl = document.getElementById('memory-content');
  
  if (!res.ok) {
    contentEl.innerHTML = '<div class="empty">加载失败 memory file</div>';
    return;
  }
  
  const content = res.data || '';
  contentEl.innerHTML = `<pre style="padding:16px;background:var(--bg-secondary);border-radius:var(--radius-sm);overflow-x:auto;font-size:12px;line-height:1.5;white-space:pre-wrap;">${escapeHtml(content)}</pre>`;
}

async function loadLogsData() {
  const res = await fetchAPI('/api/gateway/logs?lines=100');
  const contentEl = document.getElementById('logs-content');
  
  if (!res.ok) {
    contentEl.innerHTML = '<div class="empty">加载失败 logs</div>';
    return;
  }
  
  const logs = res.data || [];
  contentEl.innerHTML = logs.map(log => {
    const level = log.level || 'info';
    const time = log.timestamp || log.time || new Date().toISOString();
    const msg = log.message || log.msg || log.text || JSON.stringify(log);
    
    let cssClass = 'log-info';
    if (level.toLowerCase().includes('error') || level.toLowerCase().includes('fail')) cssClass = 'log-error';
    else if (level.toLowerCase().includes('warn') || level.toLowerCase().includes('warn')) cssClass = 'log-warning';
    
    return `<div class="log-line ${cssClass}">${escapeHtml(time)} - ${escapeHtml(msg)}</div>`;
  }).join('');
}

async function loadConfigData() {
  const res = await fetchAPI('/api/config');
  const contentEl = document.getElementById('config-content');
  
  if (!res.ok) {
    contentEl.textContent = '加载失败 config: ' + (res.error || '未知错误');
    return;
  }
  
  const config = res.data;
  contentEl.textContent = JSON.stringify(config, null, 2);
}

// Page-specific refresh functions
async function refreshCurrentPage() {
  switch(currentPage) {
    case 'overview': await loadOverviewData(); break;
    case 'agents': await loadAgentsData(); break;
    case 'models': await loadModelsData(); break;
    case 'sessions': await loadSessionsData(); break;
    case 'cron': await loadCronData(); break;
    case 'skills': await loadSkillsData(); break;
    case 'channels': await loadChannelsData(); break;
    case 'memory': await loadMemoryData(); break;
    case 'logs': await loadLogsData(); break;
    case 'config': await loadConfigData(); break;
  }
}

// Restart functions
function showRestartModal() { 
  document.getElementById('restart-modal').classList.add('show'); 
}
function hideRestartModal() { 
  document.getElementById('restart-modal').classList.remove('show'); 
}
async function doRestart() {
  hideRestartModal();
  await fetchAPI('/api/gateway/restart');
  alert('Gateway restart command sent');
}

// Main refresh function
async function refreshAll() {
  document.getElementById('last-refresh').textContent = formatTime(new Date());
  await refreshCurrentPage();
}

// Auto-refresh setup
function startAuto刷新() {
  if (auto刷新Interval) clearInterval(auto刷新Interval);
  auto刷新Interval = setInterval(() => {
    refreshAll();
  }, 30000);
}

// Initialize
window.addEventListener('hashchange', handleHashChange);
document.addEventListener('DOMContentLoaded', () => {
  handleHashChange();
  startAuto刷新();
  
  // Initialize collapsibles
  document.querySelectorAll('.collapsible-header').forEach(header => {
    header.addEventListener('click', () => {
      const collapsible = header.parentElement;
      collapsible.classList.toggle('open');
    });
  });
});
</script>
<script>
// Collapsible components
document.addEventListener('click', function(e) {
  if (e.target.classList.contains('collapsible-header') || e.target.classList.contains('collapsible-toggle')) {
    const collapsible = e.target.closest('.collapsible');
    if (collapsible) {
      collapsible.classList.toggle('open');
      const toggle = collapsible.querySelector('.collapsible-toggle');
      if (toggle) toggle.textContent = collapsible.classList.contains('open') ? '▲' : '▼';
    }
  }
});
</script>
